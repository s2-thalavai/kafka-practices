version: '3.8'

services:

# ----------------------------
# ZOOKEEPER
# ----------------------------
  zookeeper-1:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  zookeeper-2:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  zookeeper-3:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

# ----------------------------
# KAFKA BROKERS
# ----------------------------
  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper-1, zookeeper-2, zookeeper-3]
    ports:
      - "19093:9093"
      - "7071:7071"
    volumes:
      - kafka-data-1:/var/lib/kafka/data
      - ./secrets:/etc/kafka/secrets
      - ./jmx-exporter:/opt/jmx
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9092,EXTERNAL://localhost:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: password
      KAFKA_SSL_KEY_PASSWORD: password
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: password
      KAFKA_SSL_CLIENT_AUTH: required

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_JMX_PORT: 9999
      KAFKA_OPTS: "-javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=7071:/opt/jmx/config.yml"

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper-1, zookeeper-2, zookeeper-3]
    ports:
      - "19094:9093"
      - "7072:7071"
    volumes:
      - kafka-data-2:/var/lib/kafka/data
      - ./secrets:/etc/kafka/secrets
      - ./jmx-exporter:/opt/jmx
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9092,EXTERNAL://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: password
      KAFKA_SSL_KEY_PASSWORD: password
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: password
      KAFKA_SSL_CLIENT_AUTH: required

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper-1, zookeeper-2, zookeeper-3]
    ports:
      - "19095:9093"
      - "7073:7071"
    volumes:
      - kafka-data-3:/var/lib/kafka/data
      - ./secrets:/etc/kafka/secrets
      - ./jmx-exporter:/opt/jmx
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:9092,EXTERNAL://localhost:19095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: password
      KAFKA_SSL_KEY_PASSWORD: password
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: password
      KAFKA_SSL_CLIENT_AUTH: required

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

# ----------------------------
# SCHEMA REGISTRY
# ----------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on: [kafka-1, kafka-2, kafka-3]
    ports:
      - "8081:8081"
    volumes:
      - ./secrets:/etc/kafka/secrets
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SSL://kafka-1:9092,SSL://kafka-2:9092,SSL://kafka-3:9092

# ----------------------------
# KAFKA CONNECT
# ----------------------------
  kafka-connect:
    image: debezium/connect:2.5
    depends_on: [kafka-1, kafka-2, kafka-3]
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092

# ----------------------------
# POSTGRES
# ----------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: debezium
      POSTGRES_PASSWORD: dbz
      POSTGRES_DB: orders
    command: postgres -c wal_level=logical

# ----------------------------
# BACKUP SERVICE
# ----------------------------
  kafka-backup:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [kafka-1]
    volumes:
      - ./backup:/backup
    command: >
      bash -c "while true; do kafka-topics --bootstrap-server kafka-1:9092 --list > /backup/topics.txt; sleep 300; done"

# ----------------------------
# OBSERVABILITY
# ----------------------------
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  kafka-exporter:
    image: danielqsj/kafka-exporter
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka-1:9092

# ----------------------------
# LOAD BALANCER (NGINX)
# ----------------------------
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - kafka-ui

# ----------------------------
# REBALANCE SERVICE
# ----------------------------
  rebalance-service:
    image: python:3.11-slim
    ports:
      - "8082:8080"
    volumes:
      - ./rebalance.py:/app/rebalance.py
    working_dir: /app
    command: python rebalance.py

# ----------------------------
# KAFKA UI
# ----------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - schema-registry
    environment:
      KAFKA_CLUSTERS_0_NAME: prod-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

volumes:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  grafana-data:
